name: Deploy LIA Prototypes to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backoffice/package-lock.json
            whatsapp/package-lock.json

      - name: Build backoffice
        working-directory: backoffice
        run: npm ci && npm run build

      - name: Build whatsapp
        working-directory: whatsapp
        run: npm ci && npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/backoffice dist/whatsapp
          cp -r backoffice/dist/. dist/backoffice/
          cp -r whatsapp/dist/.   dist/whatsapp/
          cp index.html dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
